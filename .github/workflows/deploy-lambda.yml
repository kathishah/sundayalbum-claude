name: Deploy Lambda Functions

on:
  push:
    branches: [main, web-ui-implementation]
    paths:
      - "api/**"
      - "handlers/**"
      - "src/**"
      - "Dockerfile"
      - "requirements-lambda.txt"
      - ".github/workflows/deploy-lambda.yml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to deploy (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-west-2
  ACCOUNT_ID: "680073251743"

# Determine stage once, reused in both jobs via outputs
jobs:
  resolve-stage:
    name: Resolve stage
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.stage.outputs.stage }}
      suffix: ${{ steps.stage.outputs.suffix }}
    steps:
      - name: Determine stage and suffix
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ github.event.inputs.stage }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            STAGE="prod"
          else
            STAGE="dev"
          fi
          SUFFIX=$([ "$STAGE" = "prod" ] && echo "" || echo "-${STAGE}")
          echo "stage=${STAGE}" >> $GITHUB_OUTPUT
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          echo "Deploying to stage=${STAGE} (suffix='${SUFFIX}')"

  # ── Job 1: API Lambda functions (zip-based) ───────────────────────────────
  # Deploys: sa-auth, sa-jobs, sa-websocket, sa-settings, sa-broadcaster
  deploy-api:
    name: Deploy API Lambdas (${{ needs.resolve-stage.outputs.stage }})
    needs: resolve-stage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-sundayalbum
          aws-region: ${{ env.AWS_REGION }}

      - name: Zip API code
        run: |
          cd api
          zip -r ../api.zip .
          echo "API zip: $(du -sh ../api.zip | cut -f1)"

      - name: Update API Lambda functions
        run: |
          SUFFIX="${{ needs.resolve-stage.outputs.suffix }}"
          for fn in auth jobs websocket settings broadcaster; do
            FN_NAME="sa-${fn}${SUFFIX}"
            echo "Updating ${FN_NAME}..."
            aws lambda update-function-code \
              --function-name "${FN_NAME}" \
              --zip-file fileb://api.zip \
              --no-cli-pager
            aws lambda wait function-updated --function-name "${FN_NAME}"
            echo "${FN_NAME} ✓"
          done

  # ── Job 2: Pipeline Lambda functions (Docker/ARM64 container image) ───────
  # Deploys: sa-pipeline-{load,normalize,page-detect,perspective,photo-detect,
  #          photo-split,ai-orient,glare-remove,geometry,color-restore,finalize}
  deploy-pipeline:
    name: Deploy Pipeline Lambdas (${{ needs.resolve-stage.outputs.stage }})
    needs: resolve-stage
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-sundayalbum
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU (ARM64 cross-build support)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Discover ECR repo from existing Lambda
        id: ecr
        run: |
          SUFFIX="${{ needs.resolve-stage.outputs.suffix }}"
          # Get the current image URI from the load Lambda to find our ECR repo.
          # Strips the tag/digest to get just the repo base URI.
          IMAGE_URI=$(aws lambda get-function \
            --function-name "sa-pipeline-load${SUFFIX}" \
            --query 'Code.ImageUri' --output text)
          ECR_REPO=$(echo "$IMAGE_URI" | sed 's/:[^:@]*$//' | sed 's/@sha256:.*$//')
          echo "repo=${ECR_REPO}" >> $GITHUB_OUTPUT
          echo "ECR repo: ${ECR_REPO}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push pipeline image (linux/arm64)
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          STAGE="${{ needs.resolve-stage.outputs.stage }}"
          ECR_REPO="${{ steps.ecr.outputs.repo }}"
          IMAGE_URI="${ECR_REPO}:${SHORT_SHA}"

          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --push \
            -t "${IMAGE_URI}" \
            -t "${ECR_REPO}:${STAGE}-latest" \
            .

          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Built and pushed: ${IMAGE_URI}"

      - name: Update pipeline Lambda functions
        run: |
          SUFFIX="${{ needs.resolve-stage.outputs.suffix }}"
          IMAGE_URI="${{ steps.image.outputs.uri }}"

          for fn in load normalize page-detect perspective photo-detect photo-split ai-orient glare-remove geometry color-restore finalize; do
            FN_NAME="sa-pipeline-${fn}${SUFFIX}"
            echo "Updating ${FN_NAME}..."
            aws lambda update-function-code \
              --function-name "${FN_NAME}" \
              --image-uri "${IMAGE_URI}" \
              --no-cli-pager
            aws lambda wait function-updated --function-name "${FN_NAME}"
            echo "${FN_NAME} ✓"
          done
