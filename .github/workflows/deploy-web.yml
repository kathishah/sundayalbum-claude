name: Deploy Web App

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to deploy (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: sundayalbum-web
  ACCOUNT_ID: "680073251743"

jobs:
  build-and-deploy:
    name: Build & Deploy (${{ github.ref_name == 'main' && 'prod' || 'dev' }})
    # dev → dev App Runner | main → prod App Runner
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ github.event.inputs.stage }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "stage=prod" >> $GITHUB_OUTPUT
          else
            echo "stage=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-sundayalbum
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          STAGE=${{ steps.stage.outputs.stage }}
          ECR_URI="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${STAGE}-latest" >> $GITHUB_OUTPUT

          # Resolve stage-specific API/WS URLs so build args can be set before docker build
          if [ "${STAGE}" = "prod" ]; then
            echo "api_url=https://e1f6o1ah49.execute-api.us-west-2.amazonaws.com" >> $GITHUB_OUTPUT
            echo "ws_url=wss://l7t59cvhyh.execute-api.us-west-2.amazonaws.com/\$default" >> $GITHUB_OUTPUT
          else
            echo "api_url=https://nodcooz758.execute-api.us-west-2.amazonaws.com" >> $GITHUB_OUTPUT
            echo "ws_url=wss://0rqvs3ydf9.execute-api.us-west-2.amazonaws.com/\$default" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        working-directory: web
        run: |
          # NEXT_PUBLIC_* vars must be baked in at build time — pass as --build-arg
          docker build \
            --provenance=false \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.image.outputs.api_url }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ steps.image.outputs.ws_url }} \
            -t ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }} \
            -t ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.latest_tag }} \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }}
          docker push ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.latest_tag }}

      - name: Deploy to App Runner (dev)
        if: steps.stage.outputs.stage == 'dev'
        run: |
          STAGE=dev
          SERVICE_NAME="sundayalbum-web-${STAGE}"
          API_URL="https://nodcooz758.execute-api.us-west-2.amazonaws.com"
          WS_URL="wss://0rqvs3ydf9.execute-api.us-west-2.amazonaws.com/\$default"

          SOURCE_CONFIG="{
            \"ImageRepository\": {
              \"ImageIdentifier\": \"${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }}\",
              \"ImageConfiguration\": {
                \"Port\": \"8080\",
                \"RuntimeEnvironmentVariables\": {
                  \"NEXT_PUBLIC_API_URL\": \"${API_URL}\",
                  \"NEXT_PUBLIC_WS_URL\": \"${WS_URL}\",
                  \"NODE_ENV\": \"production\"
                }
              },
              \"ImageRepositoryType\": \"ECR\"
            },
            \"AuthenticationConfiguration\": {
              \"AccessRoleArn\": \"arn:aws:iam::${{ env.ACCOUNT_ID }}:role/AppRunnerECRAccessRole\"
            },
            \"AutoDeploymentsEnabled\": false
          }"

          INSTANCE_CONFIG="{\"Cpu\": \"1 vCPU\", \"Memory\": \"2 GB\"}"
          HEALTH_CONFIG="{\"Protocol\": \"TCP\", \"Interval\": 10, \"Timeout\": 5, \"HealthyThreshold\": 1, \"UnhealthyThreshold\": 5}"

          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service ${SERVICE_NAME}..."
            aws apprunner create-service \
              --service-name "${SERVICE_NAME}" \
              --source-configuration "${SOURCE_CONFIG}" \
              --instance-configuration "${INSTANCE_CONFIG}" \
              --health-check-configuration "${HEALTH_CONFIG}"
          else
            echo "Updating existing App Runner service ${SERVICE_NAME} (${SERVICE_ARN})..."
            aws apprunner update-service \
              --service-arn "${SERVICE_ARN}" \
              --source-configuration "${SOURCE_CONFIG}"
          fi

      - name: Deploy to App Runner (prod)
        if: steps.stage.outputs.stage == 'prod'
        run: |
          STAGE=prod
          SERVICE_NAME="sundayalbum-web-${STAGE}"
          API_URL="https://e1f6o1ah49.execute-api.us-west-2.amazonaws.com"
          WS_URL="wss://l7t59cvhyh.execute-api.us-west-2.amazonaws.com/\$default"

          SOURCE_CONFIG="{
            \"ImageRepository\": {
              \"ImageIdentifier\": \"${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }}\",
              \"ImageConfiguration\": {
                \"Port\": \"8080\",
                \"RuntimeEnvironmentVariables\": {
                  \"NEXT_PUBLIC_API_URL\": \"${API_URL}\",
                  \"NEXT_PUBLIC_WS_URL\": \"${WS_URL}\",
                  \"NODE_ENV\": \"production\"
                }
              },
              \"ImageRepositoryType\": \"ECR\"
            },
            \"AuthenticationConfiguration\": {
              \"AccessRoleArn\": \"arn:aws:iam::${{ env.ACCOUNT_ID }}:role/AppRunnerECRAccessRole\"
            },
            \"AutoDeploymentsEnabled\": false
          }"

          INSTANCE_CONFIG="{\"Cpu\": \"1 vCPU\", \"Memory\": \"2 GB\"}"
          HEALTH_CONFIG="{\"Protocol\": \"TCP\", \"Interval\": 10, \"Timeout\": 5, \"HealthyThreshold\": 1, \"UnhealthyThreshold\": 5}"

          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new App Runner service ${SERVICE_NAME}..."
            aws apprunner create-service \
              --service-name "${SERVICE_NAME}" \
              --source-configuration "${SOURCE_CONFIG}" \
              --instance-configuration "${INSTANCE_CONFIG}" \
              --health-check-configuration "${HEALTH_CONFIG}"
          else
            echo "Updating existing App Runner service ${SERVICE_NAME} (${SERVICE_ARN})..."
            aws apprunner update-service \
              --service-arn "${SERVICE_ARN}" \
              --source-configuration "${SOURCE_CONFIG}"
          fi

      - name: Wait for deployment
        run: |
          STAGE=${{ steps.stage.outputs.stage }}
          SERVICE_NAME="sundayalbum-web-${STAGE}"
          echo "Waiting for ${SERVICE_NAME} to reach RUNNING state..."

          for i in $(seq 1 40); do
            SERVICE_ARN=$(aws apprunner list-services \
              --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" \
              --output text)
            STATUS=$(aws apprunner describe-service \
              --service-arn "${SERVICE_ARN}" \
              --query 'Service.Status' --output text)
            echo "Status: ${STATUS} (attempt ${i}/40)"
            if [ "${STATUS}" = "RUNNING" ]; then
              echo "Deployment successful!"
              exit 0
            fi
            if [ "${STATUS}" = "CREATE_FAILED" ] || [ "${STATUS}" = "UPDATE_FAILED" ]; then
              echo "Deployment FAILED"
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deployment"
          exit 1

      - name: Print service URL
        if: success()
        run: |
          STAGE=${{ steps.stage.outputs.stage }}
          SERVICE_NAME="sundayalbum-web-${STAGE}"
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$(aws apprunner list-services \
              --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" \
              --output text)" \
            --query 'Service.ServiceUrl' --output text)
          echo "Deployed to: https://${SERVICE_URL}"
