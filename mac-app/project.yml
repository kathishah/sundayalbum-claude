name: SundayAlbum

options:
  bundleIdPrefix: com.sundayalbum
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  SundayAlbum:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SundayAlbum
    dependencies:
      - sdk: Photos.framework
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sundayalbum.mac
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Sunday Album"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Sunday Album saves your processed photos to the Photos library."
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  SundayAlbumTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SundayAlbumTests
    dependencies:
      - target: SundayAlbum
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sundayalbum.mac.tests
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        SWIFT_STRICT_CONCURRENCY: targeted
